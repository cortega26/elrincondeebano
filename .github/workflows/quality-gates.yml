name: Quality Gates

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '37 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  complexity:
    name: Cyclomatic Complexity (Lizard)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
        with:
          python-version: '3.12'

      - name: Install lizard
        run: pip install 'lizard==1.17.10'

      - name: Run complexity analysis
        run: |
          lizard \
            --CCN 10 \
            --length 100 \
            --arguments 5 \
            --warning-msv 10 \
            --exclude 'node_modules/|dist/|.venv/|reports/|.stryker-tmp/|coverage/|astro-poc/.astro/|_archive/' \
            .

  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ensure reports directory
        shell: bash
        run: mkdir -p reports/trivy

      - name: Run Trivy vulnerability scanner (fs mode)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'reports/trivy/trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln,secret,misconfig'
          skip-dirs: 'node_modules,.venv,reports,coverage,.stryker-tmp,astro-poc/.astro,astro-poc/dist'

      - name: Upload SARIF results to GitHub Security tab
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: reports/trivy/trivy-results.sarif
          category: trivy

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report
          path: reports/trivy
          if-no-files-found: ignore

  shellcheck:
    name: Shell Script Lint (ShellCheck)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          format: tty
          severity: error
          scandir: '.'
          additional_files: 'tools/ci/*.sh'

  actionlint:
    name: Workflow Lint (actionlint)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          shellcheck: '--exclude=SC2086,SC2129,SC2012'

  markdownlint:
    name: Markdown Lint (markdownlint-cli2)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'

      - name: Run markdownlint-cli2
        run: npx markdownlint-cli2 'docs/**/*.md' '*.md' '#node_modules' '#astro-poc/node_modules'
