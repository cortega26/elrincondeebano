name: Continuous Integration

on:
  push:
    # Always validate main pushes so the Pages deploy chain cannot be skipped by path filters.
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Pre-build checks (no build artifact needed) ──

  lint-and-typecheck:
    name: Lint, Images, and Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-and-deps

      - name: Lint repository
        run: npm run lint

      - name: Lint images
        run: npm run lint:images

      - name: Typecheck active storefront and legacy modules
        run: npm run typecheck

  unit-tests:
    name: Unit and Integration Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-and-deps

      - name: Run unit and integration tests
        run: npm test

  static-checks:
    name: Static Checks and Guardrails
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-and-deps
        with:
          skip-npm-ci: 'true'

      - name: Determinism path scan
        run: npm run check:determinism

      - name: Validate E2E CSS selectors exist in source
        run: npm run check:e2e-selectors

      - name: Guard orphan assets
        run: npm run guardrails:assets

      - name: Run full guardrails suite
        run: npm run guardrails

  # ── Build artifact (shared with downstream jobs) ──

  build-and-check:
    name: Build and Determinism Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-and-deps

      - name: Build project
        run: npm run build

      - name: Deterministic build check
        run: |
          rm -rf build-determinism-a build-determinism-b
          cp -R astro-poc/dist build-determinism-a
          npm run build
          cp -R astro-poc/dist build-determinism-b
          find build-determinism-a -type f -print0 | sort -z | xargs -0 sha256sum | sed 's#build-determinism-a/##' > build-a.sha
          find build-determinism-b -type f -print0 | sort -z | xargs -0 sha256sum | sed 's#build-determinism-b/##' > build-b.sha
          if ! diff -u build-a.sha build-b.sha > build-determinism.diff; then
            cat build-determinism.diff
            exit 1
          fi

      - name: Upload determinism artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: determinism-artifacts
          path: |
            build-a.sha
            build-b.sha
            build-determinism.diff
          if-no-files-found: ignore

      - name: Upload build artifact for downstream jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: astro-dist
          path: astro-poc/dist
          if-no-files-found: error
          retention-days: 1

  # ── Post-build checks (build artifact needed) ──

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build-and-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-and-deps

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-dist
          path: astro-poc/dist

      - uses: ./.github/actions/setup-playwright

      - name: Run canonical Playwright suite against the validated artifact
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [build-and-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-and-deps

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-dist
          path: astro-poc/dist

      - name: Lighthouse regression audit
        run: npm run lighthouse:audit
        env:
          LH_SKIP_BUILD: '1'

      - name: Upload Lighthouse reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-reports
          path: reports/lighthouse
          if-no-files-found: ignore

  # ── Aggregation (must wait for all jobs) ──

  verify:
    name: CI Verification Summary
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs:
      - lint-and-typecheck
      - unit-tests
      - static-checks
      - build-and-check
      - e2e-tests
      - lighthouse
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-and-deps
        with:
          skip-npm-ci: 'true'

      - name: Check all CI jobs passed
        shell: bash
        run: |
          STATUS="success"

          check_job() {
            if [ "$1" != "success" ] && [ "$1" != "skipped" ]; then
              echo "::error::Job $2 failed: $1"
              STATUS="failure"
            fi
          }

          check_job "${{ needs.lint-and-typecheck.result }}" "lint-and-typecheck"
          check_job "${{ needs.unit-tests.result }}" "unit-tests"
          check_job "${{ needs.static-checks.result }}" "static-checks"
          check_job "${{ needs.build-and-check.result }}" "build-and-check"
          check_job "${{ needs.e2e-tests.result }}" "e2e-tests"
          check_job "${{ needs.lighthouse.result }}" "lighthouse"

          echo "CI_STATUS=$STATUS" >> $GITHUB_ENV

          npm run smoke:evidence -- \
            --output reports/smoke/ci-${{ github.sha }}.md \
            --status "$STATUS" \
            --base-url https://www.elrincondeebano.com \
            --commit ${{ github.sha }} \
            --run-id ${{ github.run_id }} \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          mkdir -p reports/smoke
          {
            echo "## CI Summary"
            echo ""
            echo "- Node: $(node -v)"
            echo "- SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-unset}"
            echo "- Jobs: lint-and-typecheck, unit-tests, static-checks, build-and-check, e2e-tests, lighthouse"
            echo "- Result: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi

      - name: Upload smoke evidence artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-evidence
          path: reports/smoke
          if-no-files-found: error

      - name: Upload orphan-assets report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: orphan-assets-report
          path: reports/orphan-assets
          if-no-files-found: ignore
