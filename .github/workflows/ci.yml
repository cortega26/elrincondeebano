name: Continuous Integration

on:
  push:
    # Always validate main pushes so the Pages deploy chain cannot be skipped by path filters.
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            astro-poc/package-lock.json

      - name: Set deterministic build environment
        run: |
          echo "TZ=UTC" >> $GITHUB_ENV
          echo "LC_ALL=C.UTF-8" >> $GITHUB_ENV
          echo "LANG=C.UTF-8" >> $GITHUB_ENV
          echo "CFIMG_DISABLE=1" >> $GITHUB_ENV
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV

      - name: Install root dependencies
        run: npm ci

      - name: Install Astro storefront dependencies
        working-directory: astro-poc
        run: npm ci

      - name: Determinism path scan
        run: npm run check:determinism

      - name: Lint repository
        run: npm run lint

      - name: Typecheck active storefront and legacy modules
        run: npm run typecheck

      - name: Run unit and integration tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Guard orphan assets
        run: npm run guardrails:assets

      - name: Deterministic build check
        run: |
          rm -rf build-determinism-a build-determinism-b
          cp -R astro-poc/dist build-determinism-a
          npm run build
          cp -R astro-poc/dist build-determinism-b
          find build-determinism-a -type f -print0 | sort -z | xargs -0 sha256sum | sed 's#build-determinism-a/##' > build-a.sha
          find build-determinism-b -type f -print0 | sort -z | xargs -0 sha256sum | sed 's#build-determinism-b/##' > build-b.sha
          if ! diff -u build-a.sha build-b.sha > build-determinism.diff; then
            cat build-determinism.diff
            exit 1
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run canonical Playwright suite against the validated artifact
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npm run test:e2e

      - name: Upload determinism artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: determinism-artifacts
          path: |
            build-a.sha
            build-b.sha
            build-determinism.diff
          if-no-files-found: ignore

      - name: Generate smoke evidence template
        if: always()
        run: |
          npm run smoke:evidence -- \
            --output reports/smoke/ci-${{ github.sha }}.md \
            --status pending \
            --base-url https://www.elrincondeebano.com \
            --commit ${{ github.sha }} \
            --run-id ${{ github.run_id }} \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload smoke evidence artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-evidence
          path: reports/smoke
          if-no-files-found: error

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

      - name: Lighthouse regression audit
        run: npm run lighthouse:audit
        env:
          LH_SKIP_BUILD: '1'

      - name: Upload Lighthouse reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-reports
          path: reports/lighthouse
          if-no-files-found: ignore

      - name: Upload orphan-assets report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: orphan-assets-report
          path: reports/orphan-assets
          if-no-files-found: ignore

      - name: Write CI summary
        if: always()
        shell: bash
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- Node: $(node -v)"
            echo "- SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-unset}"
            if [ -f build-determinism.diff ]; then
              echo "- Determinism diff: build-determinism.diff"
            else
              echo "- Determinism diff: none"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
