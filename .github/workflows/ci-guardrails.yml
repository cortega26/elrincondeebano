name: CI Guardrails

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Resolve Node version
        shell: bash
        run: |
          if [ -f .node-version ]; then
            echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV
          else
            echo "NODE_VERSION=22" >> $GITHUB_ENV
          fi
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            astro-poc/package-lock.json
      - name: Install root dependencies
        run: npm ci

      - name: Install Astro storefront dependencies
        working-directory: astro-poc
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lint images
        run: npm run lint:images
      - name: Guardrails
        run: npm run guardrails
