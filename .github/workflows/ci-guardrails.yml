name: CI Guardrails

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Resolve Node version
        shell: bash
        run: |
          if [ -f .node-version ]; then
            echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV
          else
            echo "NODE_VERSION=24" >> $GITHUB_ENV
          fi
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            astro-poc/package-lock.json
      - name: Install dependencies (npm workspaces)
        run: bash tools/ci/npm-ci-with-retry.sh
      - name: Build
        run: npm run build
      - name: Lint images
        run: npm run lint:images
      - name: Guardrails
        run: npm run guardrails
