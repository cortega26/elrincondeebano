name: Deploy Cloudflare Edge Security Headers

on:
  push:
    branches: ['main']
    paths:
      - 'infra/cloudflare/edge-security-headers/**'
      - 'tools/security-header-policy.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: '22.x'

      - name: Verify Cloudflare deploy token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret is required to deploy edge security headers." >&2
            exit 1
          fi

      - name: Deploy edge security headers worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --config infra/cloudflare/edge-security-headers/wrangler.toml

      - name: Write deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Deploy Cloudflare Edge Security Headers"
            echo ""
            echo "- Worker: elrincondeebano-edge-security-headers"
            echo "- Route: www.elrincondeebano.com/*"
            echo "- Source of truth: tools/security-header-policy.mjs"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo "Result: ✅ Worker deployed."
            else
              echo "Result: ❌ Worker deployment failed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
