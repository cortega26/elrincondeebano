# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages
# Authoritative production deploy path for elrincondeebano.com

on:
  # Pushes to main are the authoritative production deploy path.
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      confirm_production_deploy:
        description: 'Safety confirmation phrase for a manual main deployment: DEPLOY'
        required: false
        default: ''

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read

# Cancel in-progress deploys when a new one is triggered. This prevents
# race conditions in GitHub Pages that cause "Deployment failed, try again later"
# when multiple deploys (push + manual dispatch) overlap.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  reject-invalid-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.confirm_production_deploy != 'DEPLOY' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Require explicit confirmation on main
        run: |
          echo "Manual Pages deploys from refs/heads/main require confirm_production_deploy=DEPLOY."
          exit 1

  verify-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/setup-node-and-deps
        with:
          cfimg: 'enable'
      - name: Build storefront (verification only)
        run: npm run build
      - uses: ./.github/actions/setup-playwright
      - name: Run blocking browser canary against the verification artifact
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npx playwright test -c playwright.astro.config.ts test/e2e-astro/deploy-canary.spec.ts --trace on
      - name: Upload verification artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: astro-dist-verification
          path: astro-poc/dist
          if-no-files-found: error

  deploy:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.confirm_production_deploy == 'DEPLOY') }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Resolve deploy metadata
        shell: bash
        run: |
          echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_REQUESTED_REF=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_REQUESTED_REF=${{ github.sha }}" >> "$GITHUB_ENV"
          fi
      - uses: ./.github/actions/setup-node-and-deps
        with:
          cfimg: 'enable'
      - name: Build storefront
        run: npm run build
      - uses: ./.github/actions/setup-playwright
      - name: Run blocking browser canary against the shipped artifact
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npx playwright test -c playwright.astro.config.ts test/e2e-astro/deploy-canary.spec.ts --trace on
      - name: Generate smoke evidence template (post-deploy checklist)
        run: |
          npm run smoke:evidence -- \
            --output reports/smoke/deploy-${{ env.DEPLOY_SHA }}.md \
            --status pending \
            --base-url https://www.elrincondeebano.com \
            --commit ${{ env.DEPLOY_SHA }} \
            --run-id ${{ github.run_id }} \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Upload smoke evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-evidence-deploy
          path: reports/smoke
          if-no-files-found: error
      - name: Write deploy summary
        shell: bash
        run: |
          {
            echo "## Deploy Metadata"
            echo ""
            echo "- Requested ref: ${DEPLOY_REQUESTED_REF}"
            echo "- Deployed SHA: ${DEPLOY_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          # Upload staged build output
          path: 'astro-poc/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-browser-canary-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
