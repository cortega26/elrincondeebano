# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages
# Authoritative production deploy path for elrincondeebano.com

on:
  # Pushes to main are the authoritative production deploy path.
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      confirm_production_deploy:
        description: 'Safety confirmation phrase for a manual main deployment: DEPLOY'
        required: false
        default: ''

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  reject-invalid-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.confirm_production_deploy != 'DEPLOY' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Require explicit confirmation on main
        run: |
          echo "Manual Pages deploys from refs/heads/main require confirm_production_deploy=DEPLOY."
          exit 1

  verify-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - name: Set deterministic build environment
        run: |
          echo "TZ=UTC" >> $GITHUB_ENV
          echo "LC_ALL=C.UTF-8" >> $GITHUB_ENV
          echo "LANG=C.UTF-8" >> $GITHUB_ENV
          echo "CFIMG_ENABLE=1" >> $GITHUB_ENV
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            astro-poc/package-lock.json
      - name: Install root dependencies
        run: npm ci

      - name: Install Astro storefront dependencies
        working-directory: astro-poc
        run: npm ci
      - name: Build storefront (verification only)
        run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run blocking browser canary against the verification artifact
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npx playwright test -c playwright.astro.config.ts test/e2e-astro/deploy-canary.spec.ts --trace on
      - name: Upload verification artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: astro-dist-verification
          path: astro-poc/dist
          if-no-files-found: error

  deploy:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.confirm_production_deploy == 'DEPLOY') }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - name: Resolve deploy metadata
        shell: bash
        run: |
          echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_REQUESTED_REF=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_REQUESTED_REF=${{ github.sha }}" >> "$GITHUB_ENV"
          fi
      - name: Set deterministic build environment
        run: |
          echo "TZ=UTC" >> $GITHUB_ENV
          echo "LC_ALL=C.UTF-8" >> $GITHUB_ENV
          echo "LANG=C.UTF-8" >> $GITHUB_ENV
          echo "CFIMG_ENABLE=1" >> $GITHUB_ENV
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            astro-poc/package-lock.json
      - name: Install root dependencies
        run: npm ci

      - name: Install Astro storefront dependencies
        working-directory: astro-poc
        run: npm ci
      - name: Build storefront
        run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run blocking browser canary against the shipped artifact
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npx playwright test -c playwright.astro.config.ts test/e2e-astro/deploy-canary.spec.ts --trace on
      - name: Generate smoke evidence template (post-deploy checklist)
        run: |
          npm run smoke:evidence -- \
            --output reports/smoke/deploy-${{ env.DEPLOY_SHA }}.md \
            --status pending \
            --base-url https://www.elrincondeebano.com \
            --commit ${{ env.DEPLOY_SHA }} \
            --run-id ${{ github.run_id }} \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Upload smoke evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-evidence-deploy
          path: reports/smoke
          if-no-files-found: error
      - name: Write deploy summary
        shell: bash
        run: |
          {
            echo "## Deploy Metadata"
            echo ""
            echo "- Requested ref: ${DEPLOY_REQUESTED_REF}"
            echo "- Deployed SHA: ${DEPLOY_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          # Upload staged build output
          path: 'astro-poc/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-browser-canary-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
