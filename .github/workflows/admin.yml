name: Admin Tools CI

on:
  push:
    paths:
      - 'admin/**'
      - 'tools/category_og/**'
      - 'config/category_og_icon_map.json'
      - 'assets/images/og/icons/**'
      - 'assets/images/og/categories/**'
  pull_request:
    paths:
      - 'admin/**'
      - 'tools/category_og/**'
      - 'config/category_og_icon_map.json'
      - 'assets/images/og/icons/**'
      - 'assets/images/og/categories/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: admin/product_manager

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            admin/product_manager/requirements.txt
            admin/product_manager/requirements.lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c requirements.lock.txt
          python -m pip check

      - name: Run static analysis (ruff)
        run: |
          python -m ruff check .

      - name: Run security scan (bandit)
        run: |
          # Focus on shipped application code; tests intentionally use pytest asserts and fixtures.
          python -m bandit -q -r . -x tests,./tests,.pytest_cache,./.pytest_cache,__pycache__,./__pycache__,.venv-ci-admin,./.venv-ci-admin

      - name: Run tests
        run: |
          # Run pytest with the configuration in tests/conftest.py
          python -m pytest
