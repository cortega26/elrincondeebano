name: Semgrep Security Scan

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '23 3 * * 6'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep-security-scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: Semgrep Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/requirements-semgrep.txt

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements-semgrep.txt

      - name: Run Semgrep scan
        run: |
          mkdir -p reports/semgrep
          semgrep scan \
            --config p/default \
            --config p/secrets \
            --metrics=off \
            --sarif \
            --output reports/semgrep/results.sarif \
            --exclude-rule html.security.audit.missing-integrity.missing-integrity \
            --exclude-rule javascript.lang.security.audit.detect-non-literal-regexp.detect-non-literal-regexp \
            --exclude-rule javascript.lang.security.audit.path-traversal.path-join-resolve-traversal.path-join-resolve-traversal \
            --exclude-rule javascript.lang.security.audit.unsafe-formatstring.unsafe-formatstring \
            --exclude-rule problem-based-packs.insecure-transport.js-node.using-http-server.using-http-server \
            --exclude-rule python.lang.security.audit.dynamic-urllib-use-detected.dynamic-urllib-use-detected \
            --exclude admin/product_manager/.venv-ci-admin \
            .

      - name: Generate Markdown report
        env:
          SARIF_REPORT_TITLE: Semgrep Security Report
        run: python3 scripts/sarif_to_md.py reports/semgrep/results.sarif reports/semgrep/REPORT.md

      - name: Upload SARIF results
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
        with:
          sarif_file: reports/semgrep/results.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-report
          path: reports/semgrep
          if-no-files-found: error
