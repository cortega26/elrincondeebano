name: Verify catalog build artifacts

on:
  push:
    paths:
      - data/product_data.json
      - data/category_registry.json
      - astro-poc/**/*
  pull_request:
    paths:
      - data/product_data.json
      - data/category_registry.json
      - astro-poc/**/*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ensure-build-in-sync:
    name: Ensure build artifacts remain reproducible
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Set deterministic build environment
        run: |
          echo "TZ=UTC" >> $GITHUB_ENV
          echo "LC_ALL=C.UTF-8" >> $GITHUB_ENV
          echo "LANG=C.UTF-8" >> $GITHUB_ENV
          echo "CFIMG_DISABLE=1" >> $GITHUB_ENV
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV

      - name: Use Node.js 22.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            astro-poc/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Astro storefront dependencies
        working-directory: astro-poc
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint repository
        run: npm run lint

      - name: Typecheck active storefront and legacy modules
        run: npm run typecheck

      - name: Build storefront
        run: npm run build

      - name: Run unit and integration tests
        run: npm test

      - name: Run canonical Playwright suite against the validated artifact
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npm run test:e2e

      - name: Inspect staged output
        run: |
          ls -R astro-poc/dist | head -n 120

      - name: Verify working tree is clean
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Detected tracked changes after running Astro build. Synced data/public files must be committed."
            git status --short
            exit 1
          fi

      - name: Auto-commit synced files for Dependabot
        if: failure() && github.actor == 'dependabot[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Re-authenticate since persist-credentials is false
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add data/product_data.json robots.txt astro-poc/public/robots.txt || true
          git commit -m "chore(ci): auto-sync generated files for dependabot PR [skip ci]"
          git push
      - name: Capture failure diagnostics
        if: failure()
        shell: bash
        run: |
          git status --short > git-status.txt

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: product-data-guard-artifacts
          path: |
            astro-poc/dist/sitemap.xml
            git-status.txt
          if-no-files-found: warn

      - name: Write guard summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Product Data Guard Summary"
            echo ""
            echo "- Build output root: astro-poc/dist"
            if [ -f astro-poc/dist/sitemap.xml ]; then
              echo "- Sitemap: astro-poc/dist/sitemap.xml"
            else
              echo "- Sitemap: missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
