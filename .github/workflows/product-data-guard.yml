name: Verify catalog build artifacts

on:
  push:
    paths:
      - data/product_data.json
      - data/category_registry.json
      - astro-poc/**/*
  pull_request:
    paths:
      - data/product_data.json
      - data/category_registry.json
      - astro-poc/**/*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ensure-build-in-sync:
    name: Ensure build artifacts remain reproducible
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      dirty_tree: ${{ steps.tree_state.outputs.dirty_tree }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-and-deps

      - name: Set preflight skip OG
        shell: bash
        run: echo "PREFLIGHT_SKIP_OG=1" >> $GITHUB_ENV

      - name: Build storefront
        run: npm run build

      - name: Inspect staged output
        run: |
          ls -R astro-poc/dist | head -n 120

      - name: Check working tree state
        id: tree_state
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "dirty_tree=true" >> "$GITHUB_OUTPUT"
          else
            echo "dirty_tree=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify working tree is clean
        if: ${{ steps.tree_state.outputs.dirty_tree == 'true' }}
        run: |
          echo "::error::Detected tracked changes after running Astro build. Synced data/public files must be committed."
          git status --short
          exit 1

      - name: Capture failure diagnostics
        if: failure()
        shell: bash
        run: |
          git status --short > git-status.txt

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: product-data-guard-artifacts
          path: |
            astro-poc/dist/sitemap.xml
            git-status.txt
          if-no-files-found: warn

      - name: Write guard summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Product Data Guard Summary"
            echo ""
            echo "- Build output root: astro-poc/dist"
            if [ -f astro-poc/dist/sitemap.xml ]; then
              echo "- Sitemap: astro-poc/dist/sitemap.xml"
            else
              echo "- Sitemap: missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  auto-commit-synced-files-for-dependabot:
    name: Auto-commit synced files for Dependabot
    needs: ensure-build-in-sync
    if: ${{ always() && needs.ensure-build-in-sync.outputs.dirty_tree == 'true' && github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-and-deps

      - name: Set preflight skip OG
        shell: bash
        run: echo "PREFLIGHT_SKIP_OG=1" >> $GITHUB_ENV

      - name: Rebuild synced outputs
        run: npm run build

      - name: Commit synced files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add data/product_data.json robots.txt astro-poc/public/robots.txt || true
          git add assets/images/og/ || true
          git add assets/images/web/ || true
          if git diff --cached --quiet; then
            echo "No synced changes remained after rebuild. Skipping commit."
            exit 0
          fi
          git commit -m "chore(ci): auto-sync generated files for dependabot PR [skip ci]"
          git push
