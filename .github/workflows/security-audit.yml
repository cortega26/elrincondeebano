name: Security Audits

on:
  schedule:
    - cron: '13 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: root
            working_directory: .
            lockfile: package-lock.json
          - label: astro-poc
            working_directory: astro-poc
            lockfile: astro-poc/package-lock.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}
      - name: Run npm audit (${{ matrix.label }}, production only)
        working-directory: ${{ matrix.working_directory }}
        run: npm audit --package-lock-only --omit=dev --audit-level=high

  pip-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit (if requirements files exist)
        shell: bash
        run: |
          if [ -f admin/product_manager/requirements.lock.txt ]; then
            pip-audit -r admin/product_manager/requirements.lock.txt
          elif [ -f admin/product_manager/requirements.txt ]; then
            pip-audit -r admin/product_manager/requirements.txt
          else
            echo "No Python requirements file found; skipping pip-audit."
          fi
