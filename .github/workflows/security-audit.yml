name: Security Audits

on:
  schedule:
    - cron: '13 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: root
            working_directory: .
            lockfile: package-lock.json
          - label: astro-poc
            working_directory: astro-poc
            lockfile: astro-poc/package-lock.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}
      - name: Run npm audit (${{ matrix.label }}, production only)
        working-directory: ${{ matrix.working_directory }}
        run: npm audit --package-lock-only --omit=dev --audit-level=high

  pip-audit:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit (if requirements files exist)
        shell: bash
        run: |
          if [ -f admin/product_manager/requirements.lock.txt ]; then
            pip-audit -r admin/product_manager/requirements.lock.txt
          elif [ -f admin/product_manager/requirements.txt ]; then
            pip-audit -r admin/product_manager/requirements.txt
          else
            echo "No Python requirements file found; skipping pip-audit."
          fi
