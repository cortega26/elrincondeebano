name: "Setup Node.js and install dependencies"
description: "Setup Node 24.x with npm cache, deterministic env vars, and npm ci"

inputs:
  cfimg:
    description: "'enable' or 'disable' (default). Sets CFIMG_ENABLE=1 or CFIMG_DISABLE=1"
    required: false
    default: "disable"
  skip-npm-ci:
    description: "Skip npm ci when only Node built-ins are needed"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          astro-poc/package-lock.json

    - name: Set deterministic build environment
      shell: bash
      run: |
        echo "TZ=UTC" >> $GITHUB_ENV
        echo "LC_ALL=C.UTF-8" >> $GITHUB_ENV
        echo "LANG=C.UTF-8" >> $GITHUB_ENV
        if [ "${{ inputs.cfimg }}" = "enable" ]; then
          echo "CFIMG_ENABLE=1" >> $GITHUB_ENV
        else
          echo "CFIMG_DISABLE=1" >> $GITHUB_ENV
        fi
        echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV

    - name: Install dependencies (npm workspaces)
      if: ${{ inputs.skip-npm-ci != 'true' }}
      shell: bash
      run: bash tools/ci/npm-ci-with-retry.sh
